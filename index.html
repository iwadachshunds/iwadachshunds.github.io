  <style>

<div class="page" id="root"></div>

<script>
/* ── Helpers ── */
function esc(str) {
  return String(str)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

/* Replace plain-text substrings with <a> tags using venueLinks */
function linkifyVenue(text, venueLinks) {
  if (!venueLinks || !venueLinks.length) return esc(text);
  let result = esc(text);
  for (const {text: t, url} of venueLinks) {
    const escaped = esc(t);
    result = result.replace(escaped,
      `<a href="${esc(url)}" target="_blank">${escaped}</a>`);
  }
  return result;
}

/* ── Render ── */
function render() {
  const root = document.getElementById("root");
  const s = SITE;
  const myName = s.name;

  /* Header */
  const headerLinks = (s.links || []).map(l =>
    `<a class="pill-btn" href="${esc(l.url)}" target="_blank">${esc(l.label)}</a>`
  ).join("");

  /* Bio */
  const bioHTML = s.bio.map(p => `<p>${p.trim()}</p>`).join("\n");

  /* Papers */
  const papersHTML = s.papers.map(p => {
    const authorsHTML = esc(p.authors).replace(esc("SELF"),
      `<span class="me">${esc(myName)}</span>`);
    const venueHTML   = linkifyVenue(p.venue, p.venueLinks);
    const tagHTML     = p.tag ? `<span class="paper-tag">${esc(p.tag)}</span>` : "";
    const linksHTML   = (p.links && p.links.length)
      ? `<div class="paper-links">${p.links.map(l =>
          `<a href="${esc(l.url)}" target="_blank">${esc(l.label)}</a>`).join("")}</div>`
      : "";
    return `
    <div class="paper">
      <p class="paper-title">${esc(p.title)}</p>
      <p class="paper-authors">${authorsHTML}</p>
      <p class="paper-venue">${venueHTML}${tagHTML}</p>
      ${linksHTML}
    </div>`;
  }).join("\n");

  /* Teaching */
  const teachingHTML = s.teaching.map(t => `
    <div class="ta-item">
      <p class="ta-course">${esc(t.course)}</p>
      <p class="ta-meta">${esc(t.semesters)}</p>
    </div>`).join("\n");

  root.innerHTML = `
    <header class="header">
      <img class="header-photo" src="${esc(s.photo)}" alt="${esc(myName)}">
      <div class="header-text">
        <h1>${esc(myName)}</h1>
        <p class="header-email">${esc(s.email)}</p>
      </div>
    </header>

    <section class="bio">${bioHTML}</section>

    <section class="papers">
      <div class="section-label">Research</div>
      <p class="papers-meta">
        Authors listed alphabetically.
        <a class="pill-btn" href="${esc(s.googleScholar)}" target="_blank">Google Scholar</a>
        ${headerLinks}
      </p>
      ${papersHTML}
    </section>

    <section class="teaching">
      <div class="section-label">Teaching Assistantships</div>
      ${teachingHTML}
    </section>

    <footer>${esc(myName)} &middot; Boston University</footer>
  `;
}

render();
</script>
